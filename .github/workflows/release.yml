# =============================================================================
# GitHub Actions — Release workflow for bwenv
#
# Triggers on:
#   - Pushing a version tag (e.g. v2.0.0)
#   - Manual workflow dispatch with a version input
#
# What it does:
#   1. Checks out the code and sets up Go
#   2. Runs tests to ensure everything passes
#   3. Uses GoReleaser to cross-compile binaries for all platforms
#   4. Creates a GitHub Release with archives and checksums
#   5. Updates the Homebrew tap and Scoop bucket automatically
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v2.0.0)"
        required: true
        type: string

# Only allow one release at a time to avoid conflicts.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # -- Test job: run tests before releasing --
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # -- Release job: build and publish --
  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      # Create and push the tag if triggered via workflow_dispatch
      # (manual releases may not have a tag yet).
      - name: Create tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only create the tag if it doesn't already exist.
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tokens for updating the Homebrew tap and Scoop bucket repos.
          # Set these as repository secrets if you want automatic tap/bucket updates.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      - name: Upload release artifacts summary
        run: |
          echo "## Release ${{ steps.version.outputs.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/*.tar.gz dist/*.zip 2>/dev/null | while read -r line; do
            echo "- \`$(echo "$line" | awk '{print $NF}')\` ($(echo "$line" | awk '{print $5}'))" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Checksums" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat dist/checksums.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
